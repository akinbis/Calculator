<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="main.js"></script>
    <title>Calculator</title>
</head>

<body>
    <main>
        <div class="Claculator-Container">
            <div class="calculator-wrapper">
                <input type="text" readonly>   
            </div>
            <div class="button-wrapper">
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button>DEL</button>
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button>+</button>
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button>-</button>
                <button>.</button>
                <button>0</button>
                <button>/</button>
                <button>x</button>
                <button>RESET</button>
                <button>=</button>
            </div>

            
        </div>
    </main>
</body>

</html>
